<html>
<head>
	<title>Document 1</title>
	<link rel="stylesheet" type="text/css" href="Acceuil.css">
</head>
<body>
	<section class="main">
		<section class="Legende">
		<img src="logo.jpg" class="logo" alt="Logo service">
		<p>
			Un coeur disponible, des mains ouvertes, un service pour Dieu
			hello word
		</p>
		<p>
			Servir l'autel, c'est prier avec tout ton corps!!
		</p>
	
		</section>
		
		<section class="formulaire">
			<form action="" method="post">
				<h3>Formulaire d'enregistrement</h3>
				<label for="name">Nom</label>
				<input type="text" id="name" placeholder="Entre ton nom" required>
				<br>
				<label for="prenom">Prénom Et post-nom</label>
				<input type="text" name="prenom" id="prenom" placeholder="Entre ton prenom et ton post-nom" required>
				<br>
				<label for="mail">Entre ton mail</label>
				<input type="email" name="mail" id="mail" placeholder="ex: acolyte@gmail.com" required>
				<br>
				<label for="date">Date de naissance</label>
				<input type="date" name="naissance" id="date" required>
				<br>
				<label for="passe">Créer votre mot de passe</label>
				<input type="password" name="passe" id="passe" placeholder="ex:10daubin" required>
				<br>
				<label for="validePasse">Confirmer le passe </label>
				<input type="password" name="validePasse" id="validePasse" required>
				<br>
				<select name="" id="">	
					<option value="Ancien">Ancien</option>
					<option value="Doyen">Doyen</option>
				</select>
				<br>
				<input type="submit"class="btn" value="Confirmer">
			</form>
		</section>
	</section>
</body>
</html>
